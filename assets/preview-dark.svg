  <rect x="8" y="130" width="174" height="40" rx="6" fill="transparent"/>
  <text x="18" y="147" font-family="'Segoe UI',system-ui,sans-serif" font-size="12" fill="#F0EEE8" font-weight="500">Gestures</text>
  <text x="18" y="162" font-family="'Segoe UI',system-ui,sans-serif" font-size="10" fill="#5C5A66">1,203 images</text>

  <!-- Folder 3 -->
  <rect x="8" y="176" width="174" height="40" rx="6" fill="transparent"/>
  <text x="18" y="193" font-family="'Segoe UI',system-ui,sans-serif" font-size="12" fill="#F0EEE8" font-weight="500">Anatomy Refs</text>
  <text x="18" y="208" font-family="'Segoe UI',system-ui,sans-serif" font-size="10" fill="#5C5A66">312 images</text>

  <!-- Folder 4 — scanning -->
  <rect x="8" y="222" width="174" height="40" rx="6" fill="transparent"/>
  <text x="18" y="239" font-family="'Segoe UI',system-ui,sans-serif" font-size="12" fill="#F0EEE8" font-weight="500">Life Drawing</text>
  <!-- Scan pulse dot -->
  <circle class="scan-pulse" cx="18" cy="254" r="3" fill="#C8A97E"/>
  <text x="26" y="257" font-family="'Segoe UI',system-ui,sans-serif" font-size="10" fill="#8A6F4E">Scanning…</text>

  <!-- Sidebar stat bar -->
  <rect x="0" y="418" width="190" height="42" fill="#1F1F25"/>
  <line x1="0" y1="418" x2="190" y2="418" stroke="#28283A" stroke-width="1"/>
  <text x="14" y="443" font-family="'Segoe UI',system-ui,sans-serif" font-size="10" fill="#5C5A66">2,362 images · 4 folders</text>

  <!-- ══════════════════════════════════════
       GRID TOOLBAR  (x: 190–800, y: 36–74)
  ══════════════════════════════════════ -->
  <rect x="190" y="36" width="610" height="38" fill="#18181C"/>
  <line x1="190" y1="74" x2="800" y2="74" stroke="#28283A" stroke-width="1"/>

  <!-- Search bar -->
  <rect x="202" y="46" width="200" height="22" rx="5" fill="#1F1F25" stroke="#28283A" stroke-width="1"/>
  <text x="212" y="62" font-family="'Segoe UI',system-ui,sans-serif" font-size="10" fill="#5C5A66">Search by filename…</text>
