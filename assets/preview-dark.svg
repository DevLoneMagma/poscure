      <line x1="16" y1="26" x2="11" y2="38" stroke="#5C5A66" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="16" y1="26" x2="21" y2="38" stroke="#5C5A66" stroke-width="1.5" stroke-linecap="round"/>
