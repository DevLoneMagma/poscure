<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 460" width="800" height="460">
  <defs>
    <style>
      /* Scan shimmer on thumbs */
      .shimmer { animation: shimmer 3s ease-in-out infinite; }
      @keyframes shimmer {
        0%   { transform: translateX(-100%); opacity: 0; }
        20%  { opacity: 1; }
        80%  { opacity: 1; }
        100% { transform: translateX(400%); opacity: 0; }
      }

      /* Scan pulse dot */
      .scan-pulse { animation: pulse 1.3s ease-in-out infinite; }
      @keyframes pulse {
        0%,100% { opacity: 1; r: 3; }
        50%      { opacity: 0.3; r: 2; }
      }

      /* Ring timer depletion */
      .ring-arc {
        stroke-dasharray: 163;
        stroke-dashoffset: 40;
        animation: ring 30s linear infinite;
        transform-origin: 672px 148px;
        transform: rotate(-90deg);
      }
      @keyframes ring {
        from { stroke-dashoffset: 40; }
        to   { stroke-dashoffset: 163; }
      }

      /* Timer number */
      .timer-fade { animation: numfade 1s step-end infinite; }
      @keyframes numfade {
        0%  { opacity: 1; }
        50% { opacity: 0.7; }
        100%{ opacity: 1; }
      }

      /* Progress bar fill */
      .prog-fill {
        animation: progfill 30s linear infinite;
      }
      @keyframes progfill {
        from { width: 80px; }
        to   { width: 280px; }
      }

      /* Subtle thumb hover pulse */
      .sel-glow { animation: selglow 2.5s ease-in-out infinite; }
      @keyframes selglow {
        0%,100% { opacity: 0.18; }
        50%      { opacity: 0.28; }
      }

      /* Cursor blink on search */
      .cursor { animation: blink 1.1s step-end infinite; }
      @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
    </style>

    <!-- Clip the whole card -->
    <clipPath id="card-clip">
      <rect x="0" y="0" width="800" height="460" rx="14"/>
    </clipPath>

    <!-- Thumb clip -->
    <clipPath id="thumb-clip">
      <rect x="0" y="0" width="96" height="96" rx="5"/>
    </clipPath>

    <!-- Sidebar gradient -->
    <linearGradient id="sb-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#18181C"/>
      <stop offset="100%" stop-color="#111113"/>
    </linearGradient>

    <!-- Shimmer gradient -->
    <linearGradient id="shim" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="white" stop-opacity="0"/>
      <stop offset="50%"  stop-color="white" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>

    <!-- Ring glow filter -->
    <filter id="ring-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Drop shadow for window -->
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="120%">
      <feDropShadow dx="0" dy="12" stdDeviation="24" flood-color="#000" flood-opacity="0.7"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="460" fill="#0A0A0B"/>

  <!-- Subtle grid background -->
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#28283A" stroke-width="0.4" opacity="0.4"/>
  </pattern>
  <rect width="800" height="460" fill="url(#grid)"/>

  <!-- App window card -->
  <g filter="url(#shadow)">
  <g clip-path="url(#card-clip)">

  <!-- Window base -->
  <rect x="0" y="0" width="800" height="460" rx="14" fill="#111113" stroke="#28283A" stroke-width="1"/>

  <!-- ══════════════════════════════════════
       TITLE BAR
  ══════════════════════════════════════ -->
  <rect x="0" y="0" width="800" height="36" fill="#18181C"/>
  <line x1="0" y1="36" x2="800" y2="36" stroke="#28283A" stroke-width="1"/>

  <!-- Traffic lights -->
  <circle cx="18" cy="18" r="5.5" fill="#FF5F57"/>
  <circle cx="33" cy="18" r="5.5" fill="#FFBD2E"/>
  <circle cx="48" cy="18" r="5.5" fill="#28C840"/>

  <!-- Title bar logo + name -->
  <g transform="translate(204, 10)">
    <rect width="16" height="16" rx="3.5" fill="#1F1F25" stroke="#38384E" stroke-width="0.8"/>
    <ellipse cx="8" cy="5.2" rx="1.8" ry="2" fill="none" stroke="#C8A97E" stroke-width="0.9"/>
    <line x1="8" y1="7.2" x2="8" y2="11" stroke="#C8A97E" stroke-width="0.9" stroke-linecap="round"/>
    <line x1="8" y1="8.5" x2="5.5" y2="10.5" stroke="#C8A97E" stroke-width="0.8" stroke-linecap="round"/>
    <line x1="8" y1="8.5" x2="10.5" y2="10.5" stroke="#C8A97E" stroke-width="0.8" stroke-linecap="round"/>
    <line x1="6.5" y1="11" x2="5.5" y2="14" stroke="#C8A97E" stroke-width="0.8" stroke-linecap="round"/>
    <line x1="9.5" y1="11" x2="10.5" y2="14" stroke="#C8A97E" stroke-width="0.8" stroke-linecap="round"/>
  </g>
  <text x="224" y="23" font-family="'Segoe UI',system-ui,sans-serif" font-size="11" fill="#5C5A66" font-weight="500">Poscure — Library</text>

  <!-- ══════════════════════════════════════
       SIDEBAR  (x: 0–190)
  ══════════════════════════════════════ -->
  <rect x="0" y="36" width="190" height="424" fill="url(#sb-grad)"/>
  <line x1="190" y1="36" x2="190" y2="460" stroke="#28283A" stroke-width="1"/>

  <!-- Sidebar header -->
  <rect x="0" y="36" width="190" height="38" fill="#1F1F25"/>
  <line x1="0" y1="74" x2="190" y2="74" stroke="#28283A" stroke-width="1"/>
  <text x="14" y="59" font-family="'Segoe UI',system-ui,sans-serif" font-size="9" fill="#5C5A66" font-weight="700" letter-spacing="1.2">LIBRARY</text>
  <!-- Add button -->
