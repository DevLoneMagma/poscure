  <text x="18" y="99" font-family="'Segoe UI',system-ui,sans-serif" font-size="12" fill="#C8A97E" font-weight="500">Figure Studies</text>
  <text x="18" y="115" font-family="'Segoe UI',system-ui,sans-serif" font-size="10" fill="#5C5A66">847 images</text>

