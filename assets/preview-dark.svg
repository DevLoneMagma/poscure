      <line x1="7" y1="25" x2="7" y2="38" stroke="#5C5A66" stroke-width="1.4" stroke-linecap="round"/>
      <line x1="16" y1="25" x2="25" y2="25" stroke="#5C5A66" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="25" y1="25" x2="25" y2="38" stroke="#5C5A66" stroke-width="1.4" stroke-linecap="round"/>
